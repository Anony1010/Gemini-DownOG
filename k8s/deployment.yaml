apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bot-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tg-downloader-bot
  labels:
    app: tg-downloader-bot
spec:
  replicas: 1
  strategy:
    type: Recreate # Since SQLite DB cannot be concurrently written to by different pods
  selector:
    matchLabels:
      app: tg-downloader-bot
  template:
    metadata:
      labels:
        app: tg-downloader-bot
    spec:
      containers:
      - name: tg-downloader-bot
        image: tg-downloader-bot:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: web
        env:
        - name: PORT
          value: "8080"
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: bot-secrets
              key: telegram-token
        - name: ADMIN_ID
          valueFrom:
            secretKeyRef:
              name: bot-secrets
              key: admin-id
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /api/stats
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/stats
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: bot-db-volume
          mountPath: /app/bot_database.db
          subPath: bot_database.db
      volumes:
      - name: bot-db-volume
        persistentVolumeClaim:
          claimName: bot-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tg-downloader-bot-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: web
  selector:
    app: tg-downloader-bot
